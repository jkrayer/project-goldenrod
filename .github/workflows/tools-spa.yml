name: tools-spa

on:
  push:
    paths:
      - tools/**
      - shared/**
      - package.json
      - package-lock.json
      - .github/workflows/tools-spa.yml
  pull_request:
    paths:
      - tools/**
      - shared/**
      - package.json
      - package-lock.json
      - .github/workflows/tools-spa.yml

jobs:
  tools:
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
        steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint tools app
        run: npm run lint:tools

      - name: Build tools app (production)
        run: npm run build:tools:prod

      - name: Copy tools build to docs
        run: |
          mkdir -p docs
          rsync -a --delete tools/dist/ docs/

      - name: Upload tools dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: tools-dist
          path: tools/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
